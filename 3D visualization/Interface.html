<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seeing Sound - Real-time Spectrogram</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
        :root {
            --bg-gradient-1: #e0e7ff;
            --bg-gradient-2: #fce7f3;
            --bg-gradient-3: #f1f5f9;
            
            --panel-base: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.75);
            --card-border: rgba(255, 255, 255, 0.08);

            --accent-main: #06b6d4; 
            --accent-hover: #22d3ee;
            --accent-muted: #0891b2;
            
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 40%, var(--bg-gradient-3) 100%);
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        /* Visualization Area */
        #charts-area {
            display: flex; flex: 1; padding: 30px; gap: 30px; box-sizing: border-box;
            align-items: center; justify-content: center; min-height: 350px;
        }
        
        .canvas-container {
            flex: 1; position: relative; 
            background: #0b1120;
            border-radius: 20px; overflow: hidden; 
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.5), inset 0 1px 0 rgba(255,255,255,0.08);
            max-width: 600px; height: 45vh; max-height: 400px;
        }

        .axis-y-top, .axis-y-bot, .axis-x-label, .axis-y-label { 
            pointer-events: none; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
        }
        .axis-y-top { position: absolute; top: 15px; right: 15px; color: var(--accent-main); font-size: 11px; }
        .axis-y-bot { position: absolute; bottom: 35px; right: 15px; color: var(--accent-main); font-size: 11px; }
        .axis-x-label { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); color: #64748b; font-size: 11px; letter-spacing: 2px;}
        .axis-y-label { position: absolute; top: 50%; right: 8px; transform: translateY(-50%) rotate(90deg); transform-origin: right center; color: #64748b; font-size: 10px; letter-spacing: 3px;}

        /* Control Panel */
        #controls-area {
            padding: 20px 30px 40px 30px; box-sizing: border-box; 
            overflow-y: auto; flex-shrink: 0; z-index: 2;
            background: var(--panel-base);
            box-shadow: 0 -15px 40px rgba(15, 23, 42, 0.15);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .hero-actions {
            display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; align-items: center;
        }

        .controls-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%; align-items: start;
        }
        
        .control-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 16px; padding: 24px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 1px solid var(--card-border);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .control-card:hover { border-color: rgba(252, 48, 93, 0.3); }

        .card-title {
            font-size: 13px; color: #fff; margin-bottom: 24px; 
            font-weight: 700; display: flex; align-items: center; gap: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .card-title::before {
            content: ''; display: block; width: 6px; height: 6px; 
            background: var(--accent-main); border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-main);
        }

        .control-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; gap: 15px; }
        .control-row:last-child { margin-bottom: 0; }
        .control-item { display: flex; flex-direction: column; gap: 10px; flex: 1;}
        .control-item.horizontal { flex-direction: row; align-items: center; justify-content: space-between; }
        
        label { font-size: 12px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px;}
        
        input[type="range"] { 
            width: 100%; height: 5px; background: #1e293b; 
            border-radius: 3px; outline: none; appearance: none; -webkit-appearance: none; 
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 16px; height: 16px; 
            border-radius: 50%; background: var(--accent-main); cursor: pointer; 
            box-shadow: 0 0 10px rgba(252, 48, 93, 0.5);
            border: 2px solid var(--panel-base);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { 
            transform: scale(1.3); box-shadow: 0 0 12px rgba(252, 48, 93, 0.8);
        }

        select { 
            background: rgba(0,0,0,0.2); color: #fff; 
            border: 1px solid #334155; padding: 10px 14px; 
            border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; outline: none; width: 100%;
            transition: border-color 0.2s;
        }
        select:hover { border-color: var(--accent-main); }

        .val-display { 
            color: var(--accent-hover); font-weight: 800; font-size: 12px; text-align: right; 
            background: rgba(252, 48, 93, 0.1); padding: 4px 8px; border-radius: 6px;
        }
        
        .btn {
            padding: 12px 28px; font-size: 13px; font-weight: 700; border-radius: 12px; 
            cursor: pointer; border: 1px solid transparent; transition: all 0.3s ease; 
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn:active { transform: scale(0.97); }
        
        .btn-primary { 
            background: rgba(252, 48, 93, 0.15); color: var(--accent-hover); 
            border-color: rgba(252, 48, 93, 0.4);
        }
        .btn-primary:hover { 
            background: rgba(252, 48, 93, 0.25); 
            border-color: var(--accent-main);
            box-shadow: 0 0 15px rgba(252, 48, 93, 0.2); 
        }
        
        .btn-secondary { 
            background: transparent; color: var(--text-main); 
            border-color: #334155; 
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); border-color: #475569; }

        .segmented-control {
            display: flex; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 4px; gap: 4px;
            border: 1px solid #334155;
        }
        .segment {
            flex: 1; text-align: center; padding: 6px 0; border-radius: 6px;
            font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: all 0.2s;
        }
        .segment.active { background: var(--accent-muted); color: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.3);}

        audio { height: 40px; outline: none; border-radius: 12px; flex: 1; max-width: 300px; opacity: 0.9; filter: invert(0.8) hue-rotate(180deg); }
    </style>
</head>
<body>

    <div id="charts-area">
        <div id="container-2d" class="canvas-container">
            <div class="axis-y-top"><span id="lbl-2d-max-freq">3000</span> Hz</div>
            <div class="axis-y-bot">0 Hz</div>
            <div class="axis-y-label">FREQUENCY</div>
            <div class="axis-x-label">← TIME ←</div>
        </div>
        <div id="container-3d" class="canvas-container"></div>
    </div>

    <div id="controls-area">
        <div class="hero-actions">
            <button type="button" id="btn-mic" class="btn btn-primary">🎙️ Start Listening</button>
            <span style="color: #666; font-weight: bold;">OR</span>
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('audio-upload').click()">📂 Load Audio File</button>
            <input type="file" id="audio-upload" accept="audio/*" multiple style="display: none;">
            
            <audio id="audio-player" controls style="display: none;"></audio>
            <span id="track-info" style="color: var(--text-muted); font-size: 13px; font-weight: 600; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
        </div>

        <div class="controls-grid">
            <div class="control-card">
                <div class="card-title">Color Scheme & View</div>
                <div class="control-item">
                    <select id="param-theme">
                        <option value="heat" selected>Classic Heat</option>
                        <option value="fire">Crossmodal (Fire)</option>
                        <option value="ocean">Viridis (Ocean)</option>
                        <option value="gray">Greyscale</option>
                    </select>
                </div>
                <div class="control-item horizontal" style="margin-top: 15px;">
                    <label>Auto Rotate 3D</label>
                    <div class="segmented-control" style="width: 120px;">
                        <div class="segment" id="rot-on">On</div>
                        <div class="segment active" id="rot-off">Off</div>
                    </div>
                </div>
                <button id="btn-reset-cam" class="btn btn-secondary" style="width: 100%; margin-top: 15px; border-radius: 8px; padding: 8px;">📷 Reset Camera View</button>
            </div>

            <div class="control-card">
                <div class="card-title">Detail Level & Frequency</div>
                <div class="control-item" style="margin-bottom: 20px;">
                    <div class="horizontal">
                        <label>Max Frequency</label>
                        <span id="val-max-freq" class="val-display">3000 Hz</span>
                    </div>
                    <input type="range" id="param-max-freq" min="1000" max="20000" step="500" value="3000">
                </div>
                <div class="control-item">
                    <div class="horizontal">
                        <label>Responsiveness (Smoothing)</label>
                        <span id="val-smoothing" class="val-display">0.20</span>
                    </div>
                    <input type="range" id="param-smoothing" min="0" max="0.95" step="0.05" value="0.2">
                </div>
            </div>

            <div class="control-card">
                <div class="card-title">Noise Threshold (dB)</div>
                <div class="control-item" style="margin-bottom: 20px;">
                    <div class="horizontal">
                        <label>Floor (Min Noise)</label>
                        <span id="val-min-db" class="val-display">-100 dB</span>
                    </div>
                    <input type="range" id="param-min-db" min="-120" max="-50" step="5" value="-100">
                </div>
                <div class="control-item">
                    <div class="horizontal">
                        <label>Ceiling (Max Peak)</label>
                        <span id="val-max-db" class="val-display">-20 dB</span>
                    </div>
                    <input type="range" id="param-max-db" min="-40" max="0" step="5" value="-20">
                </div>
            </div>
        </div>
    </div>

<script>

    // State & Data History Buffer
    let PARAMS = { maxFreq: 3000, minDb: -100, maxDb: -20, smoothing: 0.2, height3D: 40, theme: 'heat' };
    const HISTORY_MAX = 512;
    let historyBuffer = []; 
    let audioSampleRate = 44100; 

    function dbToIntensity(db) {
        let val = (db - PARAMS.minDb) / (PARAMS.maxDb - PARAMS.minDb);
        return Math.max(0, Math.min(1, val)) * 255;
    }

    const bindSlider = (id, paramKey, suffix = "") => {
        const slider = document.getElementById(`param-${id}`);
        const display = document.getElementById(`val-${id}`);
        slider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            PARAMS[paramKey] = val;
            if(display) display.innerText = (paramKey === 'smoothing' ? val.toFixed(2) : val) + suffix;
            if (analyser && paramKey === 'smoothing') analyser.smoothingTimeConstant = val;
            
            if (paramKey === 'maxFreq') {
                document.getElementById('lbl-2d-max-freq').innerText = val; buildXLabels();
            }
            if (paramKey === 'minDb') labels3D.yBot.updateText(val + " dB");
            if (paramKey === 'maxDb') labels3D.yTop.updateText(val + " dB");
            if (paramKey === 'height3D') labels3D.yTop.position.setY(val);

            fullRedrawFromHistory();
        });
    };

    document.getElementById('param-theme').addEventListener('change', (e) => { 
        PARAMS.theme = e.target.value; 
        fullRedrawFromHistory(); 
    });

    document.getElementById('rot-on').addEventListener('click', () => {
        document.getElementById('rot-on').classList.add('active');
        document.getElementById('rot-off').classList.remove('active');
        if(controls) controls.autoRotate = true;
    });
    document.getElementById('rot-off').addEventListener('click', () => {
        document.getElementById('rot-off').classList.add('active');
        document.getElementById('rot-on').classList.remove('active');
        if(controls) controls.autoRotate = false;
    });

    document.getElementById('btn-reset-cam').addEventListener('click', () => {
        if(camera3D && controls) { camera3D.position.set(64.4, 135.5, 23.6); controls.target.set(0.0, 10.0, 0.0); controls.update(); }
    });

    const themes = {
        heat: [[0,0,0], [0,0,128], [128,0,128], [255,0,0], [255,255,0], [255,255,255]],
        ocean: [[0,0,0], [0,0,50], [0,50,150], [0,150,255], [150,255,255], [255,255,255]],
        fire: [[0,0,0], [50,0,0], [150,0,0], [255,100,0], [255,200,0], [255,255,255]],
        gray: [[0,0,0], [255,255,255]]
    };
    function getHeatmapColor(intensity) {
        let normalized = intensity / 255.0; 
        if(PARAMS.theme === 'gray') return [normalized * 255, normalized * 255, normalized * 255];
        let colors = themes[PARAMS.theme], numSections = colors.length - 1;
        let scaledValue = normalized * numSections, index = Math.floor(scaledValue);
        let nextIndex = Math.min(index + 1, numSections), fraction = scaledValue - index;
        return [
            colors[index][0] + fraction * (colors[nextIndex][0] - colors[index][0]),
            colors[index][1] + fraction * (colors[nextIndex][1] - colors[index][1]),
            colors[index][2] + fraction * (colors[nextIndex][2] - colors[index][2])
        ];
    }

    function createDynamicTextSprite(initialText, fontsize = 24, color = "#00e5ff") {
        const canvas = document.createElement('canvas'); const context = canvas.getContext('2d');
        canvas.width = 128; canvas.height = 64; 
        const texture = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture, depthTest: false }));
        sprite.scale.set(12.8, 6.4, 1);
        sprite.updateText = function(newText) {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.font = "Bold " + fontsize + "px Inter, Arial"; context.fillStyle = color;
            context.textAlign = "center"; context.textBaseline = "middle";
            context.fillText(newText, canvas.width / 2, canvas.height / 2);
            texture.needsUpdate = true;
        };
        sprite.updateText(initialText); return sprite;
    }

    // Scene Initialization
    const container2D = document.getElementById('container-2d');
    const scene2D = new THREE.Scene();
    const camera2D = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10); camera2D.position.z = 1;
    const renderer2D = new THREE.WebGLRenderer({ antialias: false }); container2D.appendChild(renderer2D.domElement);
    const texWidth2D = 512, texHeight2D = 256; 
    const textureData2D = new Uint8Array(texWidth2D * texHeight2D * 4);
    const texture2D = new THREE.DataTexture(textureData2D, texWidth2D, texHeight2D, THREE.RGBAFormat);
    texture2D.minFilter = THREE.LinearFilter; texture2D.magFilter = THREE.LinearFilter;
    scene2D.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.MeshBasicMaterial({ map: texture2D })));

    const container3D = document.getElementById('container-3d');
    const scene3D = new THREE.Scene(); scene3D.fog = new THREE.FogExp2(0x181820, 0.005);
    const camera3D = new THREE.PerspectiveCamera(45, 1, 0.1, 1000); camera3D.position.set(64.4, 135.5, 23.6); 
    const renderer3D = new THREE.WebGLRenderer({ antialias: true, alpha: true }); container3D.appendChild(renderer3D.domElement);
    const controls = new THREE.OrbitControls(camera3D, renderer3D.domElement); controls.target.set(0, 10, 0); controls.autoRotateSpeed = 1.0; controls.autoRotate = false;

    const TIME_STEPS_3D = 250, FREQ_BINS_3D = 128, PLANE_WIDTH = 100, PLANE_DEPTH = 100;
    const geo3D = new THREE.PlaneGeometry(PLANE_WIDTH, PLANE_DEPTH, FREQ_BINS_3D - 1, TIME_STEPS_3D - 1);
    geo3D.rotateX(-Math.PI / 2);
    geo3D.setAttribute('color', new THREE.BufferAttribute(new Float32Array(geo3D.attributes.position.count * 3), 3));
    scene3D.add(new THREE.Mesh(geo3D, new THREE.MeshBasicMaterial({ vertexColors: true, side: THREE.DoubleSide })));

    const originX = -PLANE_WIDTH / 2, originZ = PLANE_DEPTH / 2, originY = 0;
    const linePts = [
        new THREE.Vector3(originX, 50, originZ), new THREE.Vector3(originX, originY, originZ),
        new THREE.Vector3(PLANE_WIDTH / 2, originY, originZ), new THREE.Vector3(originX, originY, originZ),
        new THREE.Vector3(originX, originY, -PLANE_DEPTH / 2) 
    ];
    scene3D.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(linePts), new THREE.LineBasicMaterial({ color: 0x555555 })));

    const labels3D = {
        xText: [], yTop: createDynamicTextSprite(PARAMS.maxDb + " dB", 20, "#00e5ff"), yBot: createDynamicTextSprite(PARAMS.minDb + " dB", 20, "#00e5ff"),
        zNow: createDynamicTextSprite("Now", 24, "#9ca3af"), zMid: createDynamicTextSprite("-", 24, "#9ca3af"), zOld: createDynamicTextSprite("-", 24, "#9ca3af")
    };
    labels3D.yTop.position.set(originX - 8, PARAMS.height3D, originZ); labels3D.yBot.position.set(originX - 8, originY, originZ);
    scene3D.add(labels3D.yTop); scene3D.add(labels3D.yBot);
    labels3D.zNow.position.set(originX - 8, originY, originZ); labels3D.zMid.position.set(originX - 8, originY, 0); labels3D.zOld.position.set(originX - 8, originY, -PLANE_DEPTH / 2);
    scene3D.add(labels3D.zNow); scene3D.add(labels3D.zMid); scene3D.add(labels3D.zOld);

    function buildXLabels() {
        labels3D.xText.forEach(s => scene3D.remove(s)); labels3D.xText = [];
        for (let i = 0; i <= 5; i++) {
            const sprite = createDynamicTextSprite(Math.round(PARAMS.maxFreq * (i/5)) + " Hz", 20, "#9ca3af");
            sprite.position.set(originX + (PLANE_WIDTH * (i/5)), originY - 2, originZ + 5); 
            scene3D.add(sprite); labels3D.xText.push(sprite);
        }
    }
    buildXLabels();

    bindSlider('max-freq', 'maxFreq', ' Hz');
    bindSlider('smoothing', 'smoothing');
    bindSlider('min-db', 'minDb', ' dB');
    bindSlider('max-db', 'maxDb', ' dB');

    // Retroactive Redraw Engine
    function fullRedrawFromHistory() {
        if (historyBuffer.length === 0) return;
        const maxRatio = PARAMS.maxFreq / (audioSampleRate / 2);

        textureData2D.fill(0);
        const startX = Math.max(0, texWidth2D - historyBuffer.length);
        for (let i = 0; i < historyBuffer.length; i++) {
            const x = startX + i;
            if (x >= texWidth2D) continue;
            const frame = historyBuffer[i];
            for (let y = 0; y < texHeight2D; y++) {
                const freqIdx = Math.floor((y / texHeight2D) * (frame.length * maxRatio));
                const db = frame[Math.min(freqIdx, frame.length - 1)];
                const [r, g, b] = getHeatmapColor(dbToIntensity(db));
                const idx = (x + y * texWidth2D) * 4;
                textureData2D[idx] = r; textureData2D[idx+1] = g; textureData2D[idx+2] = b; textureData2D[idx+3] = 255;
            }
        }
        texture2D.needsUpdate = true;

        const positions = geo3D.attributes.position.array, colors = geo3D.attributes.color.array;
        for (let i = 0; i < positions.length; i+=3) { positions[i+1] = 0; colors[i] = 0; colors[i+1] = 0; colors[i+2] = 0; }
        
        const frames3D = Math.min(TIME_STEPS_3D, historyBuffer.length);
        for (let z = 0; z < frames3D; z++) {
            const frameIdx = historyBuffer.length - 1 - z; 
            const frame = historyBuffer[frameIdx];
            for (let x = 0; x < FREQ_BINS_3D; x++) {
                const freqIdx = Math.floor((x / FREQ_BINS_3D) * (frame.length * maxRatio));
                const db = frame[Math.min(freqIdx, frame.length - 1)];
                const intensity = dbToIntensity(db);
                const [r, g, b] = getHeatmapColor(intensity);
                const curr = z * FREQ_BINS_3D + x;
                positions[curr * 3 + 1] = (intensity / 255) * PARAMS.height3D;
                colors[curr * 3] = r/255; colors[curr * 3 + 1] = g/255; colors[curr * 3 + 2] = b/255;
            }
        }
        geo3D.attributes.position.needsUpdate = true; geo3D.attributes.color.needsUpdate = true;

        if (!isPlaying) {
            renderer2D.render(scene2D, camera2D);
            renderer3D.render(scene3D, camera3D);
        }
    }

    // Audio & Animation Loop (MIC + FILE)
    window.addEventListener('resize', () => {
        renderer2D.setSize(container2D.clientWidth, container2D.clientHeight);
        camera3D.aspect = container3D.clientWidth / container3D.clientHeight; 
        camera3D.updateProjectionMatrix(); renderer3D.setSize(container3D.clientWidth, container3D.clientHeight);
        if(!isPlaying) { renderer2D.render(scene2D, camera2D); renderer3D.render(scene3D, camera3D); }
    }); 
    window.dispatchEvent(new Event('resize'));

    let audioCtx, analyser, floatFreqData, isPlaying = false, isAnimating = false;
    let playlist = [], currentTrack = 0;
    
    let fileSourceNode = null, micSourceNode = null; 
    let isMicMode = false, micStream = null;
    
    const audioElement = document.getElementById('audio-player');
    const trackInfo = document.getElementById('track-info');
    const btnMic = document.getElementById('btn-mic');

    function initAudioContext() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioSampleRate = audioCtx.sampleRate;
            analyser = audioCtx.createAnalyser(); 
            analyser.fftSize = 2048; 
            analyser.smoothingTimeConstant = PARAMS.smoothing;
            floatFreqData = new Float32Array(analyser.frequencyBinCount);
            
            fileSourceNode = audioCtx.createMediaElementSource(audioElement);
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    btnMic.addEventListener('click', async () => {
        try {
            if (isMicMode) {
                micStream.getTracks().forEach(track => track.stop());
                isMicMode = false;
                isPlaying = false;
                btnMic.innerText = "🎙️ Start Listening";
                return;
            }

            initAudioContext();
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            if (fileSourceNode) fileSourceNode.disconnect();
            analyser.disconnect(); 
            
            micSourceNode = audioCtx.createMediaStreamSource(micStream);
            micSourceNode.connect(analyser); 
            
            audioElement.pause(); 
            audioElement.style.display = "none";
            trackInfo.innerText = "🟢 Real-time Mic Active";
            
            isMicMode = true;
            isPlaying = true;
            btnMic.innerText = "⏹️ Stop Listening";
            
            if (!isAnimating) { isAnimating = true; animate(); }
        } catch (err) {
            alert("Microphone access error: " + err);
        }
    });

    document.getElementById('audio-upload').addEventListener('change', (e) => {
        playlist = Array.from(e.target.files);
        if (playlist.length) { 
            if (isMicMode && micStream) {
                micStream.getTracks().forEach(track => track.stop());
                isMicMode = false;
                btnMic.innerText = "🎙️ Start Listening";
            }
            currentTrack = 0; playAudioFromList(0); 
        }
    });

    function playAudioFromList(index) {
        if (index >= playlist.length) { trackInfo.innerText = `✅ Finished`; return; }
        
        if (audioElement.src) URL.revokeObjectURL(audioElement.src);
        audioElement.src = URL.createObjectURL(playlist[index]);
        audioElement.style.display = "block";
        trackInfo.innerText = `▶ ${playlist[index].name}`;

        initAudioContext();
        
        if (micSourceNode) micSourceNode.disconnect();
        
        fileSourceNode.connect(analyser); 
        analyser.connect(audioCtx.destination); 

        audioElement.play().then(() => {
            isPlaying = true;
            if (!isAnimating) { isAnimating = true; animate(); }
        }).catch(err => {
            trackInfo.innerText = `⏸ Click Play manually`;
        });
    }

    audioElement.addEventListener('play', () => { isPlaying = true; if (!isAnimating) { isAnimating = true; animate(); } });
    audioElement.addEventListener('pause', () => isPlaying = false);
    audioElement.addEventListener('ended', () => { isPlaying = false; currentTrack++; playAudioFromList(currentTrack); });

    let lastLabelUpdateTime = 0;
    function animate(time) {
        requestAnimationFrame(animate);

        if (isPlaying && analyser) {
            analyser.getFloatFrequencyData(floatFreqData);
            historyBuffer.push(new Float32Array(floatFreqData));
            if (historyBuffer.length > HISTORY_MAX) historyBuffer.shift();

            const maxRatio = PARAMS.maxFreq / (audioSampleRate / 2);
            const newestFrame = historyBuffer[historyBuffer.length - 1];

            for (let x = 0; x < texWidth2D - 1; x++) {
                for (let y = 0; y < texHeight2D; y++) {
                    const curr = (x + y * texWidth2D) * 4, next = ((x + 1) + y * texWidth2D) * 4;
                    textureData2D[curr] = textureData2D[next]; textureData2D[curr+1] = textureData2D[next+1];
                    textureData2D[curr+2] = textureData2D[next+2]; textureData2D[curr+3] = textureData2D[next+3];
                }
            }
            const lastColX = texWidth2D - 1;
            for (let y = 0; y < texHeight2D; y++) {
                const db = newestFrame[Math.min(Math.floor((y / texHeight2D) * (newestFrame.length * maxRatio)), newestFrame.length - 1)]; 
                const [r, g, b] = getHeatmapColor(dbToIntensity(db)); 
                const idx = (lastColX + y * texWidth2D) * 4;
                textureData2D[idx] = r; textureData2D[idx+1] = g; textureData2D[idx+2] = b; textureData2D[idx+3] = 255;
            }
            texture2D.needsUpdate = true;

            const positions = geo3D.attributes.position.array, colors = geo3D.attributes.color.array;
            for (let z = TIME_STEPS_3D - 1; z > 0; z--) {
                for (let x = 0; x < FREQ_BINS_3D; x++) {
                    const curr = z * FREQ_BINS_3D + x, prev = (z - 1) * FREQ_BINS_3D + x;
                    positions[curr * 3 + 1] = positions[prev * 3 + 1];
                    colors[curr * 3] = colors[prev * 3]; colors[curr * 3 + 1] = colors[prev * 3 + 1]; colors[curr * 3 + 2] = colors[prev * 3 + 2];
                }
            }
            for (let x = 0; x < FREQ_BINS_3D; x++) {
                const db = newestFrame[Math.min(Math.floor((x / FREQ_BINS_3D) * (newestFrame.length * maxRatio)), newestFrame.length - 1)]; 
                const intensity = dbToIntensity(db);
                positions[x * 3 + 1] = (intensity / 255) * PARAMS.height3D;
                const [r, g, b] = getHeatmapColor(intensity);
                colors[x * 3] = r / 255.0; colors[x * 3 + 1] = g / 255.0; colors[x * 3 + 2] = b / 255.0;  
            }
            geo3D.attributes.position.needsUpdate = true; geo3D.attributes.color.needsUpdate = true;

            if (time - lastLabelUpdateTime > 500) {
                if(!isMicMode) {
                    const curSec = audioElement.currentTime, bufDur = TIME_STEPS_3D / 60; 
                    labels3D.zNow.updateText(curSec.toFixed(1) + "s");
                    labels3D.zMid.updateText(Math.max(0, curSec - bufDur / 2).toFixed(1) + "s");
                    labels3D.zOld.updateText(Math.max(0, curSec - bufDur).toFixed(1) + "s");
                } else {
                    labels3D.zNow.updateText("Now");
                    labels3D.zMid.updateText("-0.8s");
                    labels3D.zOld.updateText("-1.6s");
                }
                lastLabelUpdateTime = time;
            }
        }

        controls.update(); 
        renderer2D.render(scene2D, camera2D);
        renderer3D.render(scene3D, camera3D);
    }
</script>
